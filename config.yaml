# config.yaml
# Database Reference Format: "db-name@MACHINE" or "db-name" (defaults to LOCAL)
# Example: "redis-b@OLDMAN" -> {host: env(OLDMAN_IP), port: 6379, db: 0}

# =============================================================================
# Network - Environment variable names for machine IPs (set in .env)
# =============================================================================
network:
  WSL2: "WSL2_MACHINE_IP"
  OLDMAN: "OLDMAN_MACHINE_IP"
  MIBUNTU: "MIBUNTU_MACHINE_IP"
  OLDMAN_REMOTE: "OLDMAN_REMOTE_IP"
  LOCAL: null  # null = 127.0.0.1

# =============================================================================
# Database Definitions (templates without host - host resolved from network)
# =============================================================================
databases:
  redis:
    redis-a:
      port: 6379
      db: 0
    redis-b:
      port: 6379
      db: 0

  postgres:
    postgres-a:
      # URL resolved from {MACHINE}_DATABASE_URL env var
      # e.g., postgres-a@WSL2 -> WSL2_DATABASE_URL
    postgres-b:

  influxdb:
    influxdb-a:
      bucket: "jerrymmm"
      influx_token_env: "WSL2_INFLUXDB_TOKEN"
    influxdb-b:
      bucket: "jerryib_trade"
      influx_token_env: "OLDMAN_INFLUXDB_TOKEN"

# =============================================================================
# Machine Roles Configuration
# =============================================================================
machines:
  wsl2:
    roles:
      StateEngine:
        enabled: false
      FactorEngine:
        enabled: false
        redis: "redis-b@OLDMAN_REMOTE"
        influxdb: "influxdb-b@OLDMAN_REMOTE"

  mibuntu:
    roles:
      NewsProcessor:
        enabled: true
        redis: "redis-b@OLDMAN"
        postgres: "postgres-b@OLDMAN"
      NewsWorker:
        enabled: true
        poll_interval: 1.0
        batch_size: 5
        news_limit: 5
        news_recency_hours: 24.0
        redis: "redis-b@OLDMAN"
        postgres: "postgres-b@OLDMAN"

  oldman:
    roles:
      SnapshotProcessor:
        enabled: true
        redis: "redis-b"           # no @MACHINE = LOCAL (127.0.0.1)
        influxdb: "influxdb-b"
      StaticDataWorker:
        enabled: true
        poll_interval: 1.0
        batch_size: 5
        redis: "redis-b"
      GridTraderBFF:
        enabled: true
        host: "0.0.0.0"
        port: 5001
        debug: false
        redis: "redis-b"
        influxdb: "influxdb-b"

  collector:
    roles:
      Collector:
        enabled: true
        redis: "redis-b"
        limit: "market_open"

  replayer:
    roles:
      Replayer:
        enabled: true
        speed: 1.0
        format: "parquet"
        rollback-to: null
        clear: false
        redis: "redis-b"
        influxdb: "influxdb-b"

# =============================================================================
# Defaults
# =============================================================================
defaults:
  replay_date: null
  suffix_id: null
  load_history: null
  log_level: "DEBUG"
  worker_count: 4
  queue_maxsize: 200
  monitor_interval: 10.0

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  active_model: deepseek
  models:
    deepseek:
      default_model: "deepseek-chat"
      system_prompt: "news_processor_prompt_v2.txt"
      base_url: "https://api.deepseek.com"
      thinking_mode: false
      api_key_env: "DEEPSEEK_API_KEY"
    kimi:
      default_model: "kimi-k2.5"
      system_prompt: "news_processor_prompt_v2.txt"
      base_url: "https://api.moonshot.cn/v1"
      thinking_mode: false
      api_key_env: "KIMI_API_KEY"

