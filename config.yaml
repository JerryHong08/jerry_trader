# config.yaml
# Database Reference Format: "db-name@MACHINE" or "db-name" (defaults to LOCAL)
# Example: "redis-b@OLDMAN" -> {host: env(OLDMAN_IP), port: 6379, db: 0}

# =============================================================================
# Network - Environment variable names for machine IPs (set in .env)
# =============================================================================
network:
  WSL2: "WSL2_MACHINE_IP"
  OLDMAN: "OLDMAN_MACHINE_IP"
  MIBUNTU: "MIBUNTU_MACHINE_IP"
  OLDMAN_REMOTE: "OLDMAN_REMOTE_IP"
  LOCAL: null  # null = 127.0.0.1

# =============================================================================
# Database Definitions (templates without host - host resolved from network)
# =============================================================================
databases:
  redis:
    redis-a:
      port: 6379
      db: 0
    redis-b:
      port: 6379
      db: 0

  postgres:
    postgres-a:
      # URL resolved from {MACHINE}_DATABASE_URL env var
      # e.g., postgres-a@WSL2 -> WSL2_DATABASE_URL
    postgres-b:

  influxdb:
    influxdb-a:
      org: "jerryhong"
      bucket: "jerrymmm"
      influx_token_env: "WSL2_INFLUXDB_TOKEN"
    influxdb-b:
      org: "jerryhong"
      bucket: "jerryib_trade"
      influx_token_env: "OLDMAN_INFLUXDB_TOKEN"

  clickhouse:
    clickhouse-a:
      host: "localhost"
      port: 8123
      user: "default"
      database: "jerry_trader"
      password_env: "CLICKHOUSE_PASSWORD"

# =============================================================================
# Machine Roles Configuration
# =============================================================================
machines:
  wsl2:
    limit: "null"    # market_open | market_close | null (never stop)
    roles:
      BarsBuilder:
        enabled: true
        redis: "redis-a"
        clickhouse: "clickhouse-a"
        # Runtime bar close policy (live ingestion):
        # hold bar closure briefly for out-of-order ticks.
        late_arrival_ms: 100
        idle_close_ms: 2000
        # Bootstrap policy (trades_backfill): strict boundary close.
        bootstrap_late_arrival_ms: 0
        bootstrap_idle_close_ms: 1
        timeframes: ["10s", "1m", "5m", "15m", "30m", "1h", "4h", "1d", "1w"] # supported bar timeframes
        manager_type: "synced-replayer" # choices=["polygon", "theta", "replayer", "synced-replayer"]
          # - "10s"
          # - "1m"
          # - "5m"
          # - "15m"
          # - "30m"
          # - "1h"
          # - "4h"
          # - "1d"
          # - "1w"
      ChartBFF:
        enabled: true
        host: "0.0.0.0"
        port: 8000
        redis: "redis-a"
        heartbeat_redis: "redis-a"
        clickhouse: "clickhouse-a"
        # manager_type: "synced-replayer" # choices=["polygon", "theta", "replayer", "synced-replayer"]
      # StateEngine:
      #   enabled: true
      #   redis: "redis-a"
      #   influxdb: "influxdb-a"
      FactorEngine:
        enabled: true
        # manager_type: "replayer" # choices=["polygon", "theta", "replayer", "synced-replayer"]
        redis: "redis-a"
        clickhouse: "clickhouse-a"
        timeframe: "1m"
        # influxdb: "influxdb-a"

  mibuntu:
    limit: "market_open"    # market_open | market_close | null (never stop)
    roles:
      NewsProcessor:
        enabled: true
        redis: "redis-b@OLDMAN"
        postgres: "postgres-b@OLDMAN"
      NewsWorker:
        enabled: true
        poll_interval: 1.0
        batch_size: 5
        news_limit: 2
        news_recency_hours: 24.0
        sources:
          - momo
          - benzinga
          - fmp
        redis: "redis-b@OLDMAN"
        postgres: "postgres-b@OLDMAN"
      AgentBFF:
        enabled: true
        host: "0.0.0.0"
        port: 5003
        redis: "redis-a"  # or "redis-b@MACHINE_B" for remote

  oldman:
    limit: "market_open"    # market_open | market_close | null (never stop)
    roles:
      SnapshotProcessor:
        enabled: true
        redis: "redis-b"           # no @MACHINE = LOCAL (127.0.0.1)
        # influxdb: "influxdb-b"
        clickhouse: "clickhouse-a" # gradual migration supplement (dual-write)
      StaticDataWorker:
        enabled: true
        poll_interval: 1.0
        batch_size: 5
        redis: "redis-b"
      JerryTraderBFF:
        enabled: true
        host: "0.0.0.0"
        port: 5001
        debug: false
        redis: "redis-b"
        # influxdb: "influxdb-b"
        clickhouse: "clickhouse-a"

  collector:
    limit: "market_open"     # collector only runs premarket
    roles:
      Collector:
        enabled: true
        redis: "redis-b"
        limit: "market_open"

  replayer:
    limit: null               # replayer never auto-stops
    roles:
      Replayer:
        enabled: true
        speed: 1.0
        format: "parquet"
        rollback_to: null
        start_from: null
        clear: false
        redis: "redis-b"
        influxdb: "influxdb-b"
        # clock_redis: points to the clock-master machine's Redis so the
        # replayer can follow the shared ReplayClock via RemoteClockFollower.
        # Use the same db-reference format as other redis configs when running
        # on a separate machine from
        # the TickDataServer (e.g. mibuntu following wsl2's clock).
        clock_redis: "redis-a@WSL2"

# =============================================================================
# Defaults
# =============================================================================
defaults:
  replay_date: null #YYYYMMDD 20260306
  replay_time: null #HHMMSS 080015
  # Used only when TickDataServer.manager_type == "synced-replayer"
  # preload_tickers: null # list of tickers to preload for synced-replayer mode (null or empty = preload all)
  preload_tickers: ["NIPG","PRSO"]
  suffix_id: null
  load_history: null
  log_level: "DEBUG"
  worker_count: 4
  queue_maxsize: 200
  monitor_interval: 10.0

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  active_model: deepseek
  models:
    deepseek:
      default_model: "deepseek-chat"
      system_prompt: "news_processor_prompt_v2.txt"
      base_url: "https://api.deepseek.com"
      thinking_mode: false
      api_key_env: "DEEPSEEK_API_KEY"
    kimi:
      default_model: "kimi-k2.5"
      system_prompt: "news_processor_prompt_v2.txt"
      base_url: "https://api.moonshot.cn/v1"
      thinking_mode: false
      api_key_env: "KIMI_API_KEY"
