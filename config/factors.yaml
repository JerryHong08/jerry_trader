  # ────────────────────────────────────────────────────────────────────────
  # Tick-based Indicators
  # ────────────────────────────────────────────────────────────────────────

  trade_rate:
    class: TradeRate
    type: trade
    params:
      window_ms: 20000  # 20 second rolling window
      min_trades: 5     # Minimum trades before computing rate
    display:
      name: TradeRate
      description: Trade rate (trades per second)
      color: "#f97316"  # orange
      priceScale: right
      mode: panel      # Separate panel below price
    definition:
      formula: "count(trades_in_window) / window_seconds"
      unit: "trades/second"
      interpretation:
        - "Higher values = more active trading"
        - "Spikes indicate momentum events"
        - "Sustained high rate = continuous participation"
      data_source: trade ticks
      warmup: requires min_trades in window
    # trade-based factors apply to all timeframes (computed independently)
    timeframes:
      - trade

